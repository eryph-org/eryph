# TCP/SNI passthrough load balancer for the active-active components (identity, compute API). TLS is
# NOT terminated here — HAProxy forwards bytes, so each backend presents its own certificate (issued
# for the LB host name) and the client validates it against the component CA. Backends are resolved at
# runtime via the podman DNS, so replicas can come and go (scale out / tier down) without a reload.

global
    log stdout format raw local0

defaults
    mode tcp
    log global
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m
    default-server init-addr none

resolvers podman
    # Use the container's own nameservers (aardvark-dns) rather than a hardcoded gateway IP, which
    # changes when the network is recreated.
    parse-resolv-conf
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s

frontend identity_fe
    bind *:8080
    default_backend identity_be

backend identity_be
    balance roundrobin
    server identity_a identity:8080 check resolvers podman init-addr none
    server identity_b identity2:8080 check resolvers podman init-addr none

frontend compute_fe
    bind *:8000
    default_backend compute_be

backend compute_be
    balance roundrobin
    server compute_a apiendpoint:8000 check resolvers podman init-addr none
    server compute_b apiendpoint2:8000 check resolvers podman init-addr none
