# Broker TLS for the split-runtime mutual-TLS bus. The provisioning step writes the certificate
# material (ca.crt = component CA bundle, server.crt = broker leaf + server intermediate, server.key)
# into /etc/rabbitmq/certs; this static config points the broker at them.
listeners.tcp.default = 5672
listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/certs/ca.crt
ssl_options.certfile   = /etc/rabbitmq/certs/server.crt
ssl_options.keyfile    = /etc/rabbitmq/certs/server.key

# Require a client certificate (mutual TLS); the cacertfile includes the client intermediate so the
# broker can build leaf -> client-intermediate -> root from the leaf each component presents.
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = true

# SASL EXTERNAL: derive the AMQP user name from the client certificate's URI SAN (the component-id URN
# eryph issues), so each component authenticates as its own per-component user (created at enrollment)
# rather than a shared one. The controller deletes that user to revoke a component. PLAIN stays enabled
# so the guest/admin user can still be used (e.g. diagnostics); the management HTTP API is unaffected by
# AMQP mechanisms and keeps using HTTP Basic.
auth_mechanisms.1 = EXTERNAL
auth_mechanisms.2 = PLAIN
ssl_cert_login_from = subject_alternative_name
ssl_cert_login_san_type = uri
ssl_cert_login_san_index = 0

# guest is loopback-only by default; allow it off loopback for the management API (per-component AMQP
# users authenticate by certificate, not as guest).
loopback_users = none
