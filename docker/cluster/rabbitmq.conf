# Broker TLS for the split-runtime mutual-TLS bus. The provisioning step writes the certificate
# material (ca.crt = component CA bundle, server.crt = broker leaf + server intermediate, server.key)
# into /etc/rabbitmq/certs; this static config points the broker at them.
#
# The bus is mutual-TLS only, so the plaintext AMQP listener is disabled entirely — only the TLS
# listener (5671) accepts connections, so there is no non-TLS port to reach inside the network.
listeners.tcp = none
listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/certs/ca.crt
ssl_options.certfile   = /etc/rabbitmq/certs/server.crt
ssl_options.keyfile    = /etc/rabbitmq/certs/server.key

# Require a client certificate (mutual TLS); the cacertfile includes the client intermediate so the
# broker can build leaf -> client-intermediate -> root from the leaf each component presents.
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = true

# SASL EXTERNAL only: derive the AMQP user name from the client certificate's URI SAN (the component-id
# URN eryph issues), so each component authenticates as its own per-component user (created at enrollment)
# rather than a shared one. The controller deletes that user to revoke a component. PLAIN is deliberately
# NOT offered, so no client can authenticate to AMQP with a password (e.g. the default guest) without a
# certificate. The management HTTP API is separate (HTTP Basic) and unaffected by AMQP mechanisms.
auth_mechanisms.1 = EXTERNAL
ssl_cert_login_from = subject_alternative_name
ssl_cert_login_san_type = uri
ssl_cert_login_san_index = 0

# guest exists only for the management HTTP API (broker user provisioning). It cannot authenticate to
# AMQP at all now that only EXTERNAL is offered; loopback_users = none lets the management API reach it
# from the identity/controller containers.
loopback_users = none
